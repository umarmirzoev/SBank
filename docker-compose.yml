services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sbank-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Database=somonibank_local;Username=postgres;Password=localpassword
      - Jwt__Secret=somonibank-super-secret-key-minimum-32-chars-local!!
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    container_name: sbank-db
    restart: always
    environment:
      - POSTGRES_DB=somonibank_local
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=localpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
