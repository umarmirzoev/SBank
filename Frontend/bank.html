<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Банк — Сомонибанк</title>
  <style>
    :root{
      --bg:#eef4ff;
      --shell:#f7faff;
      --panel:#ffffff;
      --line:#e4ebf7;
      --text:#223451;
      --muted:#8a98ae;
      --brand:#2d79ff;
      --brand-soft:#ebf4ff;
      --shadow:0 20px 48px rgba(69, 96, 146, .10);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top left,#ffffff 0,#f2f6ff 35%,#ebf1fb 100%);color:var(--text)}
    body{padding:6px}
    button,input{font:inherit}
    a{text-decoration:none;color:inherit}
    .app-shell{display:grid;grid-template-columns:144px 1fr;min-height:calc(100vh - 12px);border-radius:28px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(246,249,255,.94));box-shadow:0 24px 55px rgba(90,114,159,.12)}
    .sidebar{display:flex;flex-direction:column;padding:16px 10px 14px;background:linear-gradient(180deg,#fbfdff 0,#f3f7ff 100%);border-right:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:8px;padding:2px 4px 18px}
    .brand-logo{width:28px;height:28px;border-radius:9px;background:linear-gradient(180deg,#1f67ff,#308cff);display:grid;place-items:center;color:#fff;font-weight:800;box-shadow:0 12px 18px rgba(36,104,255,.28)}
    .brand-title{font-size:11px;font-weight:800;color:#1f63d3}
    .side-nav{display:grid;gap:6px}
    .nav-link{display:flex;align-items:center;gap:11px;height:35px;padding:0 12px;border:none;border-radius:12px;background:transparent;color:#50607a;font-size:12px;font-weight:500;cursor:pointer;text-align:left}
    .nav-link svg{width:17px;height:17px;flex:0 0 17px}
    .nav-link:hover{background:#f4f8ff;color:#2d79ff}
    .nav-link.active{background:linear-gradient(180deg,#dcebff,#edf5ff);color:#2d79ff;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
    .support{margin-top:auto;padding:10px 9px;border:1px solid var(--line);border-radius:15px;background:linear-gradient(180deg,#ffffff,#f8fbff);box-shadow:var(--shadow)}
    .support strong{display:block;font-size:10px;margin-bottom:2px}
    .support span{display:block;font-size:10px;color:var(--muted)}
    .main{padding:10px 12px 10px 0}
    .frame{min-height:100%;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.90),rgba(247,249,254,.96));border:1px solid rgba(227,234,245,.95);box-shadow:var(--shadow);overflow:hidden}
    .topbar{display:flex;align-items:center;gap:14px;padding:11px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.76);backdrop-filter:blur(14px)}
    .search{display:flex;align-items:center;gap:12px;flex:1;max-width:930px;height:40px;padding:0 16px;border:1px solid #edf2fa;border-radius:16px;background:linear-gradient(180deg,#ffffff,#f8fbff);box-shadow:inset 0 1px 2px rgba(225,232,245,.8)}
    .search svg,.icon-btn svg{width:18px;height:18px;color:#92a0b6}
    .search input{width:100%;border:none;background:transparent;outline:none;color:#55657b;font-size:14px}
    .top-actions{display:flex;align-items:center;gap:12px;margin-left:auto}
    .icon-btn{position:relative;display:grid;place-items:center;width:34px;height:34px;border:none;border-radius:50%;background:transparent;color:#334863;cursor:pointer}
    .icon-btn:hover{background:#f2f7ff}
    .badge{position:absolute;right:5px;top:2px;min-width:14px;height:14px;padding:0 4px;border-radius:999px;background:#ff7f74;color:#fff;font-size:9px;font-weight:700;display:grid;place-items:center}
    .profile{display:flex;align-items:center;gap:10px;padding-left:2px}
    .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(180deg,#f0dfca,#cfa87c);display:grid;place-items:center;font-weight:800;color:#6d4e2d;box-shadow:0 8px 16px rgba(129,100,64,.18)}
    .profile strong{font-size:14px;font-weight:700}
    .chevron{width:14px;height:14px;color:#75839b}
    .content{padding:16px 18px 22px}
    .page-title{margin:0 0 12px;font-size:24px;line-height:1.1;font-weight:700;color:#1f2f48}
    .top-grid{display:grid;grid-template-columns:338px minmax(0,1fr);gap:12px;align-items:start}
    .card{background:linear-gradient(180deg,#ffffff,#fbfcff);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    .rates-card{padding:16px 16px 14px;min-height:172px}
    .rates-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .rates-head h2{margin:0;font-size:14px;font-weight:700;color:#284061}
    .rates-head button{display:grid;place-items:center;width:26px;height:26px;border:none;border-radius:50%;background:#edf9f3;color:#23b776;cursor:pointer;font-weight:700}
    .rates-labels,.rate-row{display:grid;grid-template-columns:1.4fr .9fr .9fr;align-items:center}
    .rates-labels{margin-bottom:10px;color:#9ca9bd;font-size:11px}
    .rates-rows{display:grid;gap:12px}
    .rate-row strong{font-size:13px;font-weight:700;color:#223451}
    .currency{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700}
    .flag{display:grid;place-items:center;width:24px;height:18px;border-radius:5px;background:#f7faff;font-size:15px}
    .tiles-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .feature-tile{display:flex;flex-direction:column;justify-content:space-between;min-height:96px;padding:12px 12px 11px;border:1px solid #edf2fa;border-radius:16px;background:linear-gradient(180deg,#ffffff,#f7faff);cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}
    .feature-tile:hover,.service-card:hover,.bottom-banner:hover{transform:translateY(-2px);box-shadow:0 18px 36px rgba(67,96,145,.12)}
    .feature-icon{display:grid;place-items:center;width:42px;height:42px;border-radius:14px;background:linear-gradient(180deg,#eef4ff,#dcecff);color:#2b77ff;font-size:23px;box-shadow:inset 0 1px 1px rgba(255,255,255,.9)}
    .feature-tile strong{font-size:12px;line-height:1.1;font-weight:600;color:#2a3953}
    .section-title{margin:16px 0 12px;font-size:16px;font-weight:700;color:#223451}
    .services-wrap{padding:0}
    .services-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
    .service-card{display:flex;align-items:center;gap:10px;min-height:60px;padding:12px;border:1px solid #edf2fa;border-radius:16px;background:linear-gradient(180deg,#ffffff,#f8fbff);cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}
    .service-icon{display:grid;place-items:center;width:34px;height:34px;border-radius:11px;background:linear-gradient(180deg,#edf4ff,#dfeeff);color:#2a75ff;font-size:18px;flex:0 0 34px}
    .service-icon.green{background:linear-gradient(180deg,#e7fbf5,#d5f4ea);color:#17aa78}
    .service-icon.orange{background:linear-gradient(180deg,#fff4e7,#ffebcf);color:#f4a635}
    .service-copy strong{display:block;font-size:12px;font-weight:700;color:#223451;line-height:1.1}
    .service-copy small{display:block;margin-top:3px;font-size:9px;color:#95a3b7;line-height:1.1}
    .bottom-banner{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:14px;padding:18px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#ffffff,#f7faff);box-shadow:var(--shadow)}
    .banner-side{display:flex;align-items:center;gap:14px}
    .banner-icon{display:grid;place-items:center;width:44px;height:44px;border-radius:14px;background:linear-gradient(180deg,#e8f4ff,#d8eaff);color:#3681ff;font-size:24px}
    .banner-copy strong{display:block;font-size:17px;font-weight:800;color:#21334e}
    .banner-copy span{display:block;margin-top:4px;font-size:12px;color:#8695aa}
    .bottom-banner button{height:40px;padding:0 24px;border:none;border-radius:12px;background:linear-gradient(180deg,#3584ff,#2b6eff);color:#fff;font-weight:700;cursor:pointer;box-shadow:0 14px 24px rgba(53,132,255,.24)}
    .toast-status{position:fixed;right:18px;bottom:18px;max-width:320px;padding:12px 14px;border-radius:16px;background:#1d2c44;color:#fff;font-size:13px;box-shadow:0 20px 34px rgba(15,28,52,.28);opacity:0;transform:translateY(10px);transition:.2s ease;pointer-events:none}
    .toast-status.show{opacity:1;transform:translateY(0)}
    @media (max-width:1180px){
      .top-grid{grid-template-columns:1fr}
      .tiles-grid,.services-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:820px){
      body{padding:0}
      .app-shell{grid-template-columns:1fr;border-radius:0;min-height:100vh}
      .sidebar{display:none}
      .main{padding:0}
      .frame{border-radius:0;border:none}
      .tiles-grid,.services-grid{grid-template-columns:1fr}
      .topbar{flex-wrap:wrap}
      .bottom-banner{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">C</div>
        <div class="brand-title">Сомонибанк</div>
      </div>
      <nav class="side-nav">
        <a class="nav-link" href="somonibank-app.html"><svg viewBox="0 0 24 24" fill="none"><path d="M4 11 12 4l8 7v8a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1v-8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span>Главная</span></a>
        <a class="nav-link active" href="bank.html"><svg viewBox="0 0 24 24" fill="none"><path d="M3 10 12 5l9 5M5 10v8M10 10v8M14 10v8M19 10v8M3 20h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Банк</span></a>
        <a class="nav-link" href="payments.html"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2"/><path d="M3 10h18" stroke="currentColor" stroke-width="2"/></svg><span>Платежи</span></a>
        <a class="nav-link" href="transfers.html"><svg viewBox="0 0 24 24" fill="none"><path d="M5 7h13M14 3l4 4-4 4M19 17H6m5-4-4 4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Переводы</span></a>
        <a class="nav-link" href="deposits.html"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="2"/><path d="M4 10h16" stroke="currentColor" stroke-width="2"/></svg><span>Счета</span></a>
        <a class="nav-link" href="cards.html"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 14h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Карты</span></a>
        <a class="nav-link" href="somonibank-app.html"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3v18M6 9h9a3 3 0 0 0 0-6H9a3 3 0 0 0 0 6h6a3 3 0 0 1 0 6H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Кредиты</span></a>
        <a class="nav-link" href="deposits.html"><svg viewBox="0 0 24 24" fill="none"><path d="M5 20h14M7 20V7l5-3 5 3v13" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg><span>Депозиты</span></a>
        <a class="nav-link" href="somonibank-app.html"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>История</span></a>
        <button class="nav-link" id="logoutButton" type="button"><svg viewBox="0 0 24 24" fill="none"><path d="M10 17l5-5-5-5M15 12H3M21 3v18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Выход</span></button>
      </nav>
      <div class="support">
        <strong>Помощь и поддержка</strong>
        <span>24/7 • Онлайн чат</span>
      </div>
    </aside>

    <main class="main">
      <div class="frame">
        <header class="topbar">
          <label class="search">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="searchInput" type="search" placeholder="Поиск...">
          </label>
          <div class="top-actions">
            <button class="icon-btn" type="button" id="searchButton" aria-label="Поиск"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
            <button class="icon-btn" type="button" aria-label="Уведомления"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3a5 5 0 0 0-5 5v2l-2 3h14l-2-3V8a5 5 0 0 0-5-5Z" stroke="currentColor" stroke-width="2"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span class="badge">9</span></button>
            <div class="profile">
              <div class="avatar" id="userAvatar">И</div>
              <strong id="userName">Иван Иванов</strong>
              <svg class="chevron" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </header>

        <section class="content">
          <h1 class="page-title">Банк</h1>

          <section class="top-grid">
            <div class="card rates-card">
              <div class="rates-head">
                <h2>Курс валют Сомонибонк</h2>
                <button type="button" id="refreshRates">↻</button>
              </div>
              <div class="rates-labels">
                <span>Валюта</span>
                <span>Покупка</span>
                <span>Продажа</span>
              </div>
              <div class="rates-rows" id="ratesRows"></div>
            </div>

            <div class="tiles-grid" id="promoGrid"></div>
          </section>

          <h2 class="section-title">Все услуги</h2>
          <section class="services-wrap">
            <div class="services-grid" id="servicesGrid"></div>
          </section>

          <section class="bottom-banner">
            <div class="banner-side">
              <div class="banner-icon">🛡</div>
              <div class="banner-copy">
                <strong>Ваш банк. Ваши правила.</strong>
                <span>Надёжные финансовые решения для жизни и бизнеса.</span>
              </div>
            </div>
            <button type="button" id="detailsButton">Подробнее</button>
          </section>
        </section>
      </div>
    </main>
  </div>

  <div class="toast-status" id="toastStatus"></div>
  <script type="module" src="scripts/bank-page.js"></script>
</body>
</html>
