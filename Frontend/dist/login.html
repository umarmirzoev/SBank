<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в Сомонибанк</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#2274ff;--primary-dark:#1558d6;--accent:#38c6f4;--text:#223a5d;--muted:#7488a5;--panel:#ffffffee;--border:#d7e5fb}
    body{font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;background:radial-gradient(circle at top left,rgba(115,184,255,.95),rgba(227,240,255,.9) 32%,rgba(247,250,255,.96) 60%),linear-gradient(135deg,#dcebff 0%,#f9fbff 48%,#d8ebff 100%);color:var(--text);overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    .auth-page{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;padding:28px 18px}
    .glow,.glow-right{position:absolute;border-radius:50%;filter:blur(6px);pointer-events:none}
    .glow{left:-120px;top:40px;width:440px;height:440px;background:radial-gradient(circle,rgba(120,185,255,.5),rgba(120,185,255,0) 70%)}
    .glow-right{right:-140px;top:70px;width:460px;height:460px;background:radial-gradient(circle,rgba(166,213,255,.45),rgba(166,213,255,0) 72%)}
    .line-a,.line-b{position:absolute;border:2px solid rgba(255,255,255,.5);border-radius:999px;pointer-events:none}
    .line-a{left:-5%;top:16%;width:60%;height:48%}
    .line-b{right:-12%;bottom:10%;width:58%;height:42%}
    .scene-left,.scene-right{position:absolute;top:50%;transform:translateY(-50%);width:min(27vw,340px);height:min(58vh,560px);display:flex;align-items:flex-end;justify-content:center;pointer-events:none}
    .scene-left{left:0}
    .scene-right{right:0}
    .phone{position:relative;width:170px;height:350px;border-radius:36px;background:linear-gradient(180deg,#143f8d,#5ab7ff);box-shadow:0 28px 60px rgba(35,92,176,.25);border:8px solid #11336d}
    .phone::before{content:"";position:absolute;left:50%;top:14px;transform:translateX(-50%);width:76px;height:18px;border-radius:0 0 14px 14px;background:#0b244f}
    .screen{position:absolute;inset:20px 12px 14px;border-radius:24px;background:linear-gradient(180deg,#eff7ff,#dcebff 55%,#f8fbff);overflow:hidden}
    .screen::before{content:"";position:absolute;left:14px;right:14px;top:24px;height:16px;border-radius:8px;background:rgba(34,116,255,.15);box-shadow:0 34px 0 rgba(34,116,255,.13),0 68px 0 rgba(34,116,255,.11),0 102px 0 rgba(34,116,255,.1)}
    .screen::after{content:"";position:absolute;left:18px;right:18px;bottom:28px;height:88px;border-radius:18px;background:linear-gradient(135deg,#256cf0,#55d0ff)}
    .shield{position:absolute;width:132px;height:150px;left:-16px;bottom:18px;background:linear-gradient(180deg,#52b7ff,#2060dd);clip-path:polygon(50% 0,100% 18%,100% 58%,50% 100%,0 58%,0 18%);box-shadow:0 16px 32px rgba(41,105,207,.26)}
    .shield::after{content:"";position:absolute;left:33px;top:48px;width:56px;height:28px;border-left:7px solid #fff;border-bottom:7px solid #fff;transform:rotate(-45deg)}
    .card-bank{position:absolute;width:190px;height:110px;bottom:48px;right:-18px;border-radius:18px;background:linear-gradient(135deg,#2e7cff,#71d4ff);box-shadow:0 20px 40px rgba(50,116,219,.22)}
    .card-bank::before{content:"";position:absolute;left:18px;top:18px;width:28px;height:20px;border-radius:5px;background:linear-gradient(180deg,#f8e18f,#d7a834)}
    .card-bank::after{content:"";position:absolute;right:20px;bottom:16px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.75);box-shadow:-18px 0 0 rgba(255,255,255,.45)}
    .coin{position:absolute;width:34px;height:34px;border-radius:50%;background:linear-gradient(180deg,#ffe6a7,#d6ab42);box-shadow:0 10px 18px rgba(179,135,39,.25)}
    .coin.one{left:18px;bottom:26px}
    .coin.two{left:46px;bottom:18px}
    .coin.three{right:-6px;bottom:76px}
    .dashboard-float{position:absolute;top:72px;right:-16px;width:160px;height:112px;border-radius:22px;background:rgba(255,255,255,.7);box-shadow:0 20px 40px rgba(96,145,215,.16);backdrop-filter:blur(10px)}
    .dashboard-float::before{content:"";position:absolute;left:16px;right:16px;top:16px;height:10px;border-radius:5px;background:rgba(34,116,255,.18);box-shadow:0 24px 0 rgba(34,116,255,.12),0 48px 0 rgba(34,116,255,.1)}
    .dashboard-float::after{content:"";position:absolute;right:18px;top:24px;width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#69c9ff,#2274ff)}
    .auth-shell{position:relative;z-index:2;width:min(100%,520px);padding:22px;border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,255,255,.9));border:1px solid rgba(255,255,255,.72);box-shadow:0 30px 80px rgba(83,128,196,.22);backdrop-filter:blur(14px)}
    .auth-card{border-radius:28px;padding:18px 22px 20px}
    .brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:26px}
    .brand-badge{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#2170ff,#32c8f4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:700;box-shadow:0 14px 26px rgba(34,116,255,.24)}
    .brand-name{font-size:22px;font-weight:700;color:#233a5d}
    .hero-title{font-size:30px;line-height:1.2;text-align:center;font-weight:800;margin-bottom:12px;color:#243c60}
    .hero-copy{font-size:16px;line-height:1.55;text-align:center;color:var(--muted);max-width:330px;margin:0 auto 24px}
    .form-wrap{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:20px 18px 16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.65)}
    .field{display:grid;gap:10px;margin-bottom:14px}
    .field label{font-size:14px;font-weight:600;color:#627c9d}
    .input-shell{display:flex;align-items:center;gap:12px;min-height:56px;padding:0 16px;border-radius:16px;border:1px solid #dbe7f8;background:#fff;box-shadow:0 10px 24px rgba(217,230,247,.24)}
    .input-shell svg{width:20px;height:20px;color:#7c92b3;flex-shrink:0}
    .input-shell input{width:100%;border:none;outline:none;background:transparent;font-size:16px;color:#27415f}
    .submit-btn{width:100%;height:56px;border:none;border-radius:16px;background:linear-gradient(90deg,#1e73ff,#39c6f1);color:#fff;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 20px 30px rgba(44,135,243,.26);transition:transform .18s ease,box-shadow .18s ease}
    .submit-btn:hover{transform:translateY(-1px);box-shadow:0 24px 34px rgba(44,135,243,.3)}
    .links-row{display:flex;justify-content:space-between;gap:12px;margin-top:16px;color:#7588a4;font-size:14px}
    .links-row a:hover{color:#2563eb}
    .status{min-height:22px;margin:12px 2px 0;font-size:14px;text-align:center;color:#5f7ea6}
    .status.error{color:#d0365f}
    .status.success{color:#1e9d65}
    .features{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 18px;margin-top:22px;padding:0 8px}
    .feature{display:flex;align-items:center;gap:8px;color:#5e7da0;font-size:14px;font-weight:500}
    .feature svg{width:18px;height:18px;color:#4b8ef7;flex-shrink:0}
    .back-link{position:absolute;left:18px;top:18px;z-index:3;display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.7);color:#35557e;font-size:14px;font-weight:600;backdrop-filter:blur(10px);box-shadow:0 10px 24px rgba(92,134,193,.15)}
    .back-link:hover{background:rgba(255,255,255,.88)}
    @media(max-width:1100px){.scene-left,.scene-right{opacity:.42}.auth-shell{width:min(100%,540px)}}
    @media(max-width:860px){.scene-left,.scene-right,.line-a,.line-b,.glow,.glow-right{display:none}.auth-page{padding:16px}.auth-shell{width:100%;max-width:560px}.hero-title{font-size:28px}}
    @media(max-width:520px){.auth-shell{padding:14px}.auth-card{padding:12px}.brand{margin-bottom:18px}.hero-title{font-size:26px}.features{grid-template-columns:1fr}.links-row{font-size:13px}}
  </style>
  <script type="module" crossorigin src="/assets/login-DbHgf581.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/common-B0I44Mcg.js">
</head>
<body>
  <main class="auth-page">
    <a class="back-link" href="index.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      На главную
    </a>

    <div class="glow"></div>
    <div class="glow-right"></div>
    <div class="line-a"></div>
    <div class="line-b"></div>

    <div class="scene-left" aria-hidden="true">
      <div style="position:relative;width:300px;height:520px">
        <div class="phone" style="transform:rotate(-8deg);left:34px;top:46px">
          <div class="screen"></div>
        </div>
        <div class="shield"></div>
        <div class="card-bank"></div>
        <div class="coin one"></div>
        <div class="coin two"></div>
      </div>
    </div>

    <div class="scene-right" aria-hidden="true">
      <div style="position:relative;width:300px;height:520px">
        <div class="dashboard-float"></div>
        <div class="phone" style="transform:rotate(8deg);right:34px;top:34px">
          <div class="screen"></div>
        </div>
        <div class="shield" style="left:24px;bottom:198px;transform:scale(.7)"></div>
        <div class="card-bank" style="right:12px;bottom:28px;width:175px;height:100px"></div>
        <div class="coin three"></div>
      </div>
    </div>

    <section class="auth-shell">
      <div class="auth-card">
        <div class="brand">
          <div class="brand-badge">C</div>
          <div class="brand-name">Сомонибанк</div>
        </div>

        <h1 class="hero-title">Вход в Сомонибанк</h1>
        <p class="hero-copy">Введите номер телефона и пароль для входа в систему</p>

        <div class="form-wrap">
          <form id="loginForm">
            <div class="field">
              <label for="phone">Номер телефона</label>
              <div class="input-shell">
                <svg viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.63 2.62a2 2 0 0 1-.45 2.11L8 9.73a16 16 0 0 0 6.27 6.27l1.28-1.29a2 2 0 0 1 2.11-.45c.84.3 1.72.51 2.62.63A2 2 0 0 1 22 16.92Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <input id="phone" name="phone" type="text" inputmode="tel" placeholder="+992" autocomplete="username" required>
              </div>
            </div>

            <div class="field">
              <label for="password">Пароль</label>
              <div class="input-shell">
                <svg viewBox="0 0 24 24" fill="none"><path d="M7 11V8a5 5 0 0 1 10 0v3M5 11h14a1 1 0 0 1 1 1v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-7a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <input id="password" name="password" type="password" placeholder="••••••" autocomplete="current-password" required>
              </div>
            </div>

            <button class="submit-btn" type="submit">Войти</button>
            <div id="loginStatus" class="status"> </div>
          </form>

          <div class="links-row">
            <a href="#" id="forgotLink">Забыли пароль?</a>
            <a href="#" id="registerLink">Регистрация</a>
          </div>
        </div>

        <div class="features">
          <div class="feature">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" stroke="currentColor" stroke-width="2"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Безопасный вход
          </div>
          <div class="feature">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg>
            24/7 онлайн доступ
          </div>
          <div class="feature">
            <svg viewBox="0 0 24 24" fill="none"><path d="M20 13c0 5-8 9-8 9s-8-4-8-9V6l8-4 8 4v7Z" stroke="currentColor" stroke-width="2"/><path d="M12 8v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
            Защита ваших данных
          </div>
          <div class="feature">
            <svg viewBox="0 0 24 24" fill="none"><path d="M6 10V8a6 6 0 1 1 12 0v2" stroke="currentColor" stroke-width="2"/><rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="2"/></svg>
            Полные реквизиты карты
          </div>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
