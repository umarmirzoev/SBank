<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация в SomoniBank</title>
  <style>
    *{box-sizing:border-box}
    :root{--panel:#ffffff;--line:#d6e2fb;--primary:#2f6df6;--primary-dark:#2558cb;--text:#1f2f49;--muted:#7c8da8;--success:#16a34a;--shadow:0 18px 40px rgba(68,103,173,.12)}
    *:focus-visible{outline:3px solid rgba(47,109,246,.22);outline-offset:2px}
    body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#f8fbff 0%,#f3f6ff 100%);color:var(--text)}
    button,input,select{font:inherit}
    .page{min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 48px 14px;background:rgba(255,255,255,.92);border-bottom:1px solid #e3eaf8;box-shadow:0 4px 18px rgba(84,113,176,.06)}
    .brand{display:flex;align-items:center;gap:14px}
    .brand-mark{width:44px;height:44px;border-radius:14px;background:linear-gradient(180deg,#2d6cf5,#3f8cff);display:grid;place-items:center;color:#fff;box-shadow:0 10px 22px rgba(47,109,246,.28)}
    .brand-mark svg{width:24px;height:24px}
    .brand-copy{display:flex;flex-direction:column;gap:5px}
    .brand-copy strong{font-size:18px}
    .premium{align-self:flex-start;padding:3px 10px;border-radius:999px;background:#fff3d2;color:#c79922;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
    .top-actions{display:flex;align-items:center;gap:10px}
    .top-btn,.top-badge{width:42px;height:42px;border:1px solid #e1e8f6;border-radius:14px;background:#fff;color:#60718f;display:grid;place-items:center;box-shadow:0 8px 16px rgba(96,113,143,.08)}
    .top-badge{width:54px;border:none;background:linear-gradient(90deg,#eef3ff,#dfeaff);color:var(--primary)}
    .top-btn svg,.top-badge svg{width:18px;height:18px}
    .shell{width:min(100%,1180px);margin:0 auto;padding:28px 48px 40px}
    .steps{display:grid;grid-template-columns:repeat(4,1fr);margin:4px 0 34px;position:relative;padding:0 24px}
    .steps::before{content:"";position:absolute;left:68px;right:68px;top:20px;height:4px;border-radius:999px;background:var(--line);z-index:0}
    .progress-line{position:absolute;left:68px;top:20px;height:4px;border-radius:999px;background:linear-gradient(90deg,var(--primary),#4d89ff);z-index:1;transition:width .25s ease}
    .step{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;color:#92a2bc;font-size:14px;font-weight:600;text-align:center}
    .step-circle{width:40px;height:40px;border-radius:50%;border:2px solid #d5deee;background:#f8fbff;display:grid;place-items:center;color:#95a4bc;font-weight:700;transition:.2s ease}
    .step.active,.step.done{color:var(--text)}
    .step.active .step-circle{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 0 6px rgba(47,109,246,.12)}
    .step.done .step-circle{background:var(--primary);border-color:var(--primary);color:#fff}
    .step small{font-size:12px;line-height:1.25}
    .section-label{margin:0 0 10px;color:#d09f2f;font-size:14px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}
    .hero h1{margin:0;font-size:54px;line-height:.98;letter-spacing:-.04em;font-family:Georgia,"Times New Roman",serif;color:#1f2a3b}
    .hero p{margin:10px 0 30px;color:var(--muted);font-size:20px}
    .card{background:var(--panel);border:1px solid #e4ebf8;border-radius:28px;box-shadow:var(--shadow);padding:26px}
    .step-panel[hidden]{display:none}
    .grid.two{display:grid;grid-template-columns:1fr 1fr;gap:18px 16px}
    .grid.one{display:grid;gap:18px}
    .field{display:grid;gap:10px}
    .field label{color:#9aa7bc;font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
    .input,.select{width:100%;height:58px;border:2px solid #e4ebf8;border-radius:17px;padding:0 18px;background:#fff;color:var(--text);font-size:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
    .select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,#7f8ea7 50%),linear-gradient(135deg,#7f8ea7 50%,transparent 50%);background-position:calc(100% - 24px) 25px,calc(100% - 17px) 25px;background-size:7px 7px,7px 7px;background-repeat:no-repeat;padding-right:44px}
    .input::placeholder{color:#c7d2e5}
    .upload-list{display:grid;gap:14px}
    .upload-item{display:flex;align-items:center;gap:18px;width:100%;padding:18px 20px;border:2px solid #e5ebf8;border-radius:22px;background:#fcfdff;cursor:pointer;text-align:left;transition:border-color .2s ease,transform .2s ease,box-shadow .2s ease}
    .upload-item:hover{transform:translateY(-1px);border-color:#cfe0ff;box-shadow:0 14px 24px rgba(94,126,182,.1)}
    .upload-icon{width:50px;height:50px;border-radius:16px;background:#edf3ff;color:var(--primary);display:grid;place-items:center;flex:0 0 50px}
    .upload-icon svg{width:24px;height:24px}
    .upload-copy{display:grid;gap:6px;flex:1}
    .upload-copy strong{font-size:16px}
    .upload-copy span{font-size:14px;color:#9ba9bd}
    .upload-arrow{color:#90a1bd;font-size:28px;line-height:1}
    .upload-item.is-complete{border-color:#bde4c8;background:#f8fffb}
    .actions{display:flex;align-items:center;gap:14px;margin-top:18px}
    .btn{min-width:170px;height:56px;border:none;border-radius:18px;padding:0 24px;font-size:22px;font-weight:700;cursor:pointer;transition:transform .18s ease,opacity .18s ease,box-shadow .18s ease}
    .btn:hover{transform:translateY(-1px)}
    .btn.secondary{background:#fff;border:2px solid #e3eaf8;color:#3d4f69;box-shadow:0 8px 18px rgba(97,111,141,.08)}
    .btn.primary{flex:1;background:linear-gradient(90deg,var(--primary-dark),#3482ff);color:#fff;box-shadow:0 16px 28px rgba(47,109,246,.28)}
    .btn.success{flex:1;background:linear-gradient(90deg,#1a8d49,#1fc867);color:#fff;box-shadow:0 16px 28px rgba(27,155,83,.28)}
    .footer-link{margin-top:16px;text-align:center;color:#818fa4;font-size:15px}
    .footer-link a{color:var(--primary);font-weight:700;text-decoration:none}
    .status{min-height:22px;margin-top:16px;font-size:15px;color:#6e809a}
    .status.error{color:#d14363}
    .status.success{color:#17894c}
    .summary-stack{display:grid;gap:16px}
    .summary-card{background:var(--panel);border:1px solid #e4ebf8;border-radius:24px;box-shadow:var(--shadow);padding:18px}
    .summary-card h3{margin:0 0 14px;color:#9aa7bc;font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    .summary-item{display:flex;align-items:center;justify-content:space-between;gap:20px;min-height:48px;border:1px solid #e3eaf8;border-radius:14px;padding:0 16px;margin-top:8px;color:#6b7d97;font-size:15px}
    .summary-item strong{color:#91a1b8;font-size:13px;font-weight:800;text-transform:uppercase}
    .summary-value{color:#42556f}
    .summary-value.success{color:var(--success);font-weight:700}
    .summary-value.masked{letter-spacing:.14em}
    .agree{display:flex;gap:12px;align-items:flex-start;background:var(--panel);border:1px solid #e4ebf8;border-radius:20px;padding:16px 18px;box-shadow:var(--shadow);color:#5f718c;font-size:14px;line-height:1.5;margin-top:16px}
    .agree input{margin-top:3px;accent-color:var(--primary)}
    .agree a{color:var(--primary)}
    .copyright{margin-top:14px;text-align:center;color:#b0bacb;font-size:12px}
    .hidden-input{display:none}
    #toast{position:fixed;right:22px;bottom:22px;max-width:320px;padding:14px 18px;border-radius:16px;background:#1f2f49;color:#fff;box-shadow:0 18px 40px rgba(31,47,73,.24);opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:50}
    #toast.show{opacity:1;transform:translateY(0)}
    @media (max-width:1100px){.shell{padding:24px 22px 34px}.topbar{padding:16px 22px 12px}.hero h1{font-size:44px}}
    @media (max-width:820px){.steps{padding:0}.steps::before,.progress-line{left:32px;right:32px}.grid.two{grid-template-columns:1fr}.actions{flex-direction:column}.btn,.btn.primary,.btn.success{width:100%}.hero h1{font-size:38px}.hero p{font-size:18px}}
  </style>
  <script type="module" crossorigin src="/assets/registration-D8ozWRH1.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/common-C4wbNvtM.js">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3l6 2.7V12c0 4.2-2.55 7.15-6 9-3.45-1.85-6-4.8-6-9V5.7L12 3Z" fill="currentColor"/>
            <path d="m9.3 11.8 1.9 1.9 3.7-4.5" stroke="#2f6df6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="brand-copy">
          <strong>SomoniBank</strong>
          <span class="premium">Premium</span>
        </div>
      </div>
      <div class="top-actions" aria-hidden="true">
        <div class="top-btn"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
        <div class="top-btn"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3a5 5 0 0 0-5 5v2.3c0 .5-.2.99-.56 1.34L5 13h14l-1.44-1.36a1.9 1.9 0 0 1-.56-1.34V8a5 5 0 0 0-5-5Z" stroke="currentColor" stroke-width="2"/><path d="M9.5 18a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
        <div class="top-badge"><svg viewBox="0 0 24 24" fill="none"><path d="M12 6v12M6 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
      </div>
    </header>
    <main class="shell">
      <div class="steps" aria-label="Шаги регистрации">
        <div class="progress-line" id="progressLine"></div>
        <div class="step active" data-step-marker="1"><div class="step-circle">1</div><small>Личные<br>данные</small></div>
        <div class="step" data-step-marker="2"><div class="step-circle">2</div><small>Документы</small></div>
        <div class="step" data-step-marker="3"><div class="step-circle">3</div><small>Аккаунт</small></div>
        <div class="step" data-step-marker="4"><div class="step-circle">4</div><small>Подтверждение</small></div>
      </div>
      <section class="hero">
        <p class="section-label" id="stepCaption">Шаг 1 из 4</p>
        <h1 id="stepTitle">Личные данные</h1>
        <p id="stepDescription">Введите ваши персональные данные точно как в паспорте</p>
      </section>
      <form id="registrationForm" novalidate>
        <section class="step-panel" data-step-panel="1">
          <div class="card">
            <div class="grid two">
              <div class="field"><label for="phone">Телефон</label><input class="input" id="phone" name="phone" type="tel" placeholder="+992" required></div>
              <div class="field"><label for="firstName">Имя</label><input class="input" id="firstName" name="firstName" type="text" placeholder="Введите имя" required></div>
              <div class="field"><label for="middleName">Отчество</label><input class="input" id="middleName" name="middleName" type="text" placeholder="Введите отчество" required></div>
              <div class="field"><label for="gender">Пол</label><select class="select" id="gender" name="gender" required><option value="">Выберите пол</option><option value="Мужской">Мужской</option><option value="Женский">Женский</option></select></div>
              <div class="field" style="grid-column:1/-1"><label for="birthDate">Дата рождения</label><input class="input" id="birthDate" name="birthDate" type="text" placeholder="ДД / ММ / ГГГГ" required></div>
            </div>
          </div>
          <div class="actions"><button class="btn primary" type="button" data-next-step>Далее</button></div>
          <div class="footer-link">Уже есть аккаунт? <a href="login.html">Войти в систему</a></div>
        </section>
        <section class="step-panel" data-step-panel="2" hidden>
          <div class="card">
            <div class="upload-list">
              <label class="upload-item" data-upload-label for="passportFront">
                <input class="hidden-input" id="passportFront" name="passportFront" type="file" accept="image/*,.pdf">
                <span class="upload-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 19h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
                <span class="upload-copy"><strong>Передняя сторона паспорта</strong><span data-upload-text="passportFront">Нажмите, чтобы прикрепить файл</span></span>
                <span class="upload-arrow">›</span>
              </label>
              <label class="upload-item" data-upload-label for="passportBack">
                <input class="hidden-input" id="passportBack" name="passportBack" type="file" accept="image/*,.pdf">
                <span class="upload-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 19h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
                <span class="upload-copy"><strong>Задняя сторона паспорта</strong><span data-upload-text="passportBack">Нажмите, чтобы прикрепить файл</span></span>
                <span class="upload-arrow">›</span>
              </label>
              <label class="upload-item" data-upload-label for="selfieWithPassport">
                <input class="hidden-input" id="selfieWithPassport" name="selfieWithPassport" type="file" accept="image/*">
                <span class="upload-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M8 7l1.2-2h5.6L16 7h2a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2Z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="2"/></svg></span>
                <span class="upload-copy"><strong>Селфи с паспортом</strong><span data-upload-text="selfieWithPassport">Нажмите, чтобы прикрепить фото</span></span>
                <span class="upload-arrow">›</span>
              </label>
            </div>
          </div>
          <div class="actions"><button class="btn secondary" type="button" data-prev-step>Назад</button><button class="btn primary" type="button" data-next-step>Далее</button></div>
        </section>
        <section class="step-panel" data-step-panel="3" hidden>
          <div class="card">
            <div class="grid one">
              <div class="field"><label for="email">Email</label><input class="input" id="email" name="email" type="email" placeholder="your@email.com" required></div>
              <div class="field"><label for="password">Пароль</label><input class="input" id="password" name="password" type="password" placeholder="Минимум 8 символов" minlength="8" required></div>
              <div class="field"><label for="confirmPassword">Повторить пароль</label><input class="input" id="confirmPassword" name="confirmPassword" type="password" placeholder="Повторите пароль" minlength="8" required></div>
              <div class="field"><label for="inviteCode">Код приглашения <span style="text-transform:none;font-weight:600;letter-spacing:0;color:#9ba9bd">- необязательно</span></label><input class="input" id="inviteCode" name="inviteCode" type="text" placeholder="SOMONI-XXXX"></div>
            </div>
          </div>
          <div class="actions"><button class="btn secondary" type="button" data-prev-step>Назад</button><button class="btn primary" type="button" data-next-step>Далее</button></div>
        </section>
        <section class="step-panel" data-step-panel="4" hidden>
          <div class="summary-stack">
            <div class="summary-card"><h3>Личные данные</h3><div id="summaryPersonal"></div></div>
            <div class="summary-card"><h3>Документы</h3><div id="summaryDocuments"></div></div>
            <div class="summary-card"><h3>Аккаунт</h3><div id="summaryAccount"></div></div>
          </div>
          <label class="agree"><input id="termsAccepted" type="checkbox"><span>Я соглашаюсь с <a href="#">Условиями использования</a> и <a href="#">Политикой конфиденциальности</a> SomoniBank</span></label>
          <div class="actions"><button class="btn secondary" type="button" data-prev-step>Назад</button><button class="btn success" id="submitRegistration" type="submit">Создать аккаунт</button></div>
          <div class="copyright">© 2026 SBank. Данные защищены и зашифрованы</div>
        </section>
        <div class="status" id="registrationStatus"></div>
      </form>
    </main>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
</body>
</html>
